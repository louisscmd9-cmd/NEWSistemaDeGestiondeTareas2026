<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Jefe - Lo de Jacinto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles_new.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-jacinto fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <span style="font-size: 1.5rem;">🍴</span>
                <span class="fw-bold">Lo de Jacinto</span>
                <span class="brand-badge ms-2">Sistema de Gestión</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text" id="userInfo">👤 Usuario</span>
                <button class="btn btn-sm btn-light" id="logoutBtn">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="page-wrap container-fluid">
        <div class="row g-2">
            <!-- Columna principal: Tareas -->
            <div class="col-lg-8 col-md-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h5 class="mb-0">📋 Todas las Tareas</h5>
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <label for="fechaFiltro" class="form-label mb-0 me-2">Fecha:</label>
                            <input type="date" class="form-control form-control-sm" id="fechaFiltro" style="width: auto; min-width: 120px;">
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="tasksList">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <p>Cargando tareas...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna lateral: Crear tareas + Artículos solicitados -->
            <div class="col-lg-4 col-md-12">
                <!-- Crear Nueva Tarea -->
                <div class="card mb-2">
                    <div class="card-header">
                        <h6 class="mb-0">➕ Nueva Tarea</h6>
                    </div>
                    <div class="card-body">
                        <form id="createTaskForm">
                            <div class="mb-2">
                                <label for="titulo" class="form-label form-label-sm">Título</label>
                                <input type="text" class="form-control form-control-sm" id="titulo" placeholder="Ej: Limpiar cocina" required />
                            </div>
                            <div class="mb-2">
                                <label for="descripcion" class="form-label form-label-sm">Descripción</label>
                                <textarea class="form-control form-control-sm" id="descripcion" rows="2" placeholder="Detalles de la tarea" required></textarea>
                            </div>
                            <div class="mb-2">
                                <label for="fecha" class="form-label form-label-sm">Fecha</label>
                                <input type="date" class="form-control form-control-sm" id="fecha" required />
                            </div>
                            <div class="mb-2">
                                <label for="empleadoId" class="form-label form-label-sm">Asignar a</label>
                                <select class="form-control form-control-sm" id="empleadoId" required>
                                    <option value="">Seleccionar empleado...</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="recurrente" />
                                    <label class="form-check-label form-label-sm" for="recurrente">
                                        Recurrente (7 días)
                                    </label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-jacinto btn-sm w-100">Crear Tarea</button>
                        </form>
                    </div>
                </div>

                <!-- Artículos Solicitados -->
                <div class="card">
                    <div class="card-header">📦 Artículos Solicitados</div>
                    <div class="card-body" style="max-height: 500px; overflow-y: auto;">
                        <div id="articulosList">
                            <div class="empty-state">
                                <div class="empty-state-icon">📋</div>
                                <small>Sin solicitudes</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Editar Tarea -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">✏️ Editar Tarea</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editTaskForm">
                        <input type="hidden" id="editTaskId" />
                        <div class="mb-3">
                            <label for="editTitulo" class="form-label">Título</label>
                            <input type="text" class="form-control" id="editTitulo" required />
                        </div>
                        <div class="mb-3">
                            <label for="editDescripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="editDescripcion" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="editEmpleadoId" class="form-label">Empleado</label>
                            <select class="form-control" id="editEmpleadoId" required>
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-jacinto" id="saveEditBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastZone"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/jefe.js"></script>
</body>
</html>
