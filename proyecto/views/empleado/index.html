<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Empleado - Lo de Jacinto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles_new.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-jacinto fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <span style="font-size: 1.5rem;">🍴</span>
                <span class="fw-bold">Lo de Jacinto</span>
                <span class="brand-badge ms-2">Mis Tareas</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text" id="userInfo">👤 Usuario</span>
                <button class="btn btn-sm btn-light" id="logoutBtn">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="page-wrap container-fluid">
        <div class="row g-2">
            <!-- Columna principal: Tareas -->
            <div class="col-lg-8 col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">📋 Mis Tareas Asignadas</h5>
                    </div>
                    <div class="card-body">
                        <div id="tasksList">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <p>Cargando tareas...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna lateral: Artículos -->
            <div class="col-lg-4 col-md-12">
                <div class="side-panel">
                    <!-- Solicitar Artículos -->
                    <div class="card mb-3">
                        <div class="card-header">➕ Solicitar Artículo</div>
                        <div class="card-body">
                            <form id="articuloForm">
                                <div class="mb-2">
                                    <label for="articuloNombre" class="form-label form-label-sm">Nombre</label>
                                    <input type="text" class="form-control form-control-sm" id="articuloNombre" required>
                                <div class="mb-2">
                                    <label for="articuloDescripcion" class="form-label form-label-sm">Descripción</label>
                                    <textarea class="form-control form-control-sm" id="articuloDescripcion" rows="2" required></textarea>
                                </div>
                                <div class="mb-2">
                                    <label for="articuloCantidad" class="form-label form-label-sm">Cantidad</label>
                                    <input type="number" class="form-control form-control-sm" id="articuloCantidad" min="1" required>
                                </div>
                                <button type="submit" class="btn btn-jacinto w-100 btn-sm">Solicitar</button>
                            </form>
                        </div>
                    </div>

                    <!-- Historial de Solicitudes -->
                    <div class="card">
                        <div class="card-header">📦 Mis Solicitudes</div>
                        <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                            <div id="articulosList">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📋</div>
                                    <small>Sin solicitudes</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para explicación de tarea no completada -->
    <div class="modal fade" id="explicacionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">❌ ¿Por qué no se completó?</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="taskIdForExplicacion" />
                    <div class="mb-3">
                        <label for="explicacionText" class="form-label">¿Por qué no se completó la tarea?</label>
                        <textarea class="form-control" id="explicacionText" rows="4" placeholder="Explica brevemente por qué no fue posible completar esta tarea..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="confirmarExplicacionBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastZone"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/empleado.js"></script>
</body>
</html>
