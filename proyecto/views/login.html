<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo de Jacinto - Sistema de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles_new.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, rgba(176, 42, 42, 0.1) 0%, rgba(245, 230, 200, 0.3) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            padding: 0 1rem;
        }
        .login-card {
            border: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,.12);
            border-radius: 20px;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, var(--jacinto-primary), #951414);
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,.15);
            border-radius: 16px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .login-title {
            font-weight: 700;
            font-size: 1.8rem;
            margin: 0.5rem 0;
        }
        .login-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .login-body {
            padding: 2rem;
        }
        
        /* Responsive para tablets */
        @media (max-width: 576px) {
            body {
                padding: 1rem 0;
            }
            
            .login-container {
                padding: 0 0.75rem;
            }
            
            .login-card {
                border-radius: 16px;
            }
            
            .login-header {
                padding: 1.5rem 1rem;
            }
            
            .login-logo {
                width: 70px;
                height: 70px;
                font-size: 2rem;
                margin-bottom: 0.75rem;
            }
            
            .login-title {
                font-size: 1.5rem;
                margin: 0.3rem 0;
            }
            
            .login-subtitle {
                font-size: 0.85rem;
            }
            
            .login-body {
                padding: 1.5rem;
            }
            
            .form-control {
                font-size: 16px; /* Prevenir zoom iOS */
                padding: 0.6rem 0.8rem;
            }
            
            .form-label {
                font-size: 0.9rem;
            }
            
            .btn-lg {
                font-size: 1rem;
                padding: 0.6rem 1rem;
            }
        }
        
        /* Responsive para móviles pequeños */
        @media (max-width: 380px) {
            .login-container {
                padding: 0 0.5rem;
            }
            
            .login-header {
                padding: 1.25rem 0.75rem;
            }
            
            .login-logo {
                width: 60px;
                height: 60px;
                font-size: 1.75rem;
                margin-bottom: 0.5rem;
            }
            
            .login-title {
                font-size: 1.25rem;
            }
            
            .login-body {
                padding: 1rem;
            }
            
            .mb-3 {
                margin-bottom: 0.75rem;
            }
            
            .form-control {
                font-size: 16px;
                padding: 0.5rem 0.6rem;
            }
            
            .form-label {
                font-size: 0.8rem;
                margin-bottom: 0.25rem;
            }
            
            .btn-lg {
                font-size: 0.95rem;
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🍴</div>
                <h1 class="login-title">Lo de Jacinto</h1>
                <p class="login-subtitle">Sistema de Gestión Interna</p>
            </div>
            <div class="login-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                    <button type="submit" class="btn btn-jacinto w-100 btn-lg mb-3">Ingresar</button>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastZone"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
