<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Lo de Jacinto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles_new.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-jacinto fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <span style="font-size: 1.5rem;">🍴</span>
                <span class="fw-bold">Lo de Jacinto</span>
                <span class="brand-badge ms-2">Panel Admin</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text" id="userInfo">👤 Usuario</span>
                <button class="btn btn-sm btn-light" id="logoutBtn">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="page-wrap container-fluid">
        <div class="row g-2">
            <!-- Crear Empleado -->
            <div class="col-lg-5 col-md-12">
                <div class="card sticky-lg-top" style="top: 90px;">
                    <div class="card-header">➕ Crear Empleado</div>
                    <div class="card-body">
                        <form id="createEmpleadoForm">
                            <div class="mb-2">
                                <label for="nombre" class="form-label form-label-sm">Nombre Completo</label>
                                <input id="nombre" class="form-control form-control-sm" required />
                            </div>
                            <div class="mb-2">
                                <label for="username" class="form-label form-label-sm">Usuario</label>
                                <input id="username" class="form-control form-control-sm" required />
                            </div>
                            <div class="mb-2">
                                <label for="password" class="form-label form-label-sm">Contraseña</label>
                                <input id="password" type="password" class="form-control form-control-sm" required />
                            </div>
                            <button class="btn btn-jacinto w-100 btn-sm" type="submit">Crear</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Lista de Empleados -->
            <div class="col-lg-7 col-md-12">
                <div class="card">
                    <div class="card-header">👥 Empleados del Sistema</div>
                    <div class="card-body" id="empleadosList">
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <p>Cargando empleados...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Editar Empleado -->
    <div class="modal fade" id="editEmpleadoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">✏️ Editar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editEmpleadoForm">
                        <input type="hidden" id="editEmpleadoId" />
                        <div class="mb-3">
                            <label for="editNombre" class="form-label">Nombre</label>
                            <input id="editNombre" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="editUsername" class="form-label">Usuario</label>
                            <input id="editUsername" class="form-control" required />
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-jacinto" id="saveEditBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastZone"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
